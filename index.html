<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Practice — 100 Exercises</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap");
      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --card: #16161f;
        --border: #2a2a3a;
        --accent: #00ff88;
        --accent2: #ff6b35;
        --accent3: #a78bfa;
        --text: #e8e8f0;
        --muted: #6b6b80;
        --easy: #00ff88;
        --medium: #ffb347;
        --hard: #ff6b6b;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
      }
      header {
        padding: 20px 40px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        background: rgba(10, 10, 15, 0.97);
        backdrop-filter: blur(10px);
        z-index: 100;
      }
      .logo {
        font-size: 20px;
        font-weight: 800;
        color: var(--accent);
      }
      .logo span {
        color: var(--text);
      }
      .hstats {
        display: flex;
        gap: 20px;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
      }
      .hstat {
        color: var(--muted);
      }
      .hstat b {
        color: var(--accent);
      }
      .hero {
        padding: 50px 40px 30px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .hero h1 {
        font-size: clamp(32px, 5vw, 60px);
        font-weight: 800;
        letter-spacing: -2px;
        line-height: 1.1;
        margin-bottom: 14px;
      }
      .hero h1 .g {
        color: var(--accent);
      }
      .hero h1 .o {
        color: var(--accent2);
      }
      .hero p {
        color: var(--muted);
        font-size: 15px;
        max-width: 520px;
        line-height: 1.7;
      }
      .prog-wrap {
        padding: 20px 40px;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .prog-inner {
        max-width: 1120px;
        margin: 0 auto;
      }
      .prog-top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 13px;
      }
      .prog-label {
        color: var(--muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .prog-num {
        font-family: "JetBrains Mono", monospace;
        color: var(--accent);
      }
      .prog-bar {
        height: 6px;
        background: var(--border);
        border-radius: 100px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent3));
        border-radius: 100px;
        transition: width 0.4s ease;
        width: 0%;
      }
      .filters {
        padding: 20px 40px;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .flabel {
        font-size: 12px;
        color: var(--muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .fbtn {
        padding: 7px 14px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .fbtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .fbtn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #000;
      }
      .search {
        padding: 7px 14px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        outline: none;
        width: 220px;
        margin-left: auto;
      }
      .search:focus {
        border-color: var(--accent);
      }
      .search::placeholder {
        color: var(--muted);
      }
      .main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 40px 80px;
      }
      .chapter {
        margin-bottom: 44px;
      }
      .ch-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .ch-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        background: rgba(0, 255, 136, 0.1);
        padding: 3px 8px;
        border-radius: 5px;
        font-weight: 700;
      }
      .ch-title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      .ch-count {
        margin-left: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 10px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        background: var(--border);
        transition: background 0.2s;
      }
      .card:hover {
        border-color: rgba(0, 255, 136, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      .card:hover::before {
        background: var(--accent);
      }
      .card.done {
        opacity: 0.55;
      }
      .card.done::before {
        background: var(--accent);
      }
      .ctop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .cnum {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
      }
      .diff {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 100px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .de {
        background: rgba(0, 255, 136, 0.12);
        color: var(--easy);
      }
      .dm {
        background: rgba(255, 179, 71, 0.12);
        color: var(--medium);
      }
      .dh {
        background: rgba(255, 107, 107, 0.12);
        color: var(--hard);
      }
      .ctitle {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 5px;
        line-height: 1.3;
      }
      .cdesc {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 10px;
      }
      .cbot {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .ctopic {
        font-size: 10px;
        color: var(--accent3);
        font-family: "JetBrains Mono", monospace;
      }
      .ccheck {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        transition: all 0.2s;
      }
      .card.done .ccheck {
        background: var(--accent);
        border-color: var(--accent);
        color: #000;
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.88);
        backdrop-filter: blur(8px);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .overlay.open {
        display: flex;
      }
      .modal {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        width: 100%;
        max-width: 640px;
        max-height: 88vh;
        overflow-y: auto;
        padding: 32px;
        position: relative;
      }
      .mclose {
        position: absolute;
        top: 16px;
        right: 16px;
        background: var(--border);
        border: none;
        color: var(--text);
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .mclose:hover {
        background: var(--accent2);
      }
      .mnum {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .mtitle {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 14px;
        line-height: 1.2;
      }
      .msub {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin-bottom: 6px;
        margin-top: 16px;
      }
      .mdesc {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
        margin-bottom: 14px;
      }
      .mcode {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #a8ff78;
        line-height: 1.6;
        margin-bottom: 14px;
        white-space: pre-wrap;
        overflow-x: auto;
      }
      .mhint {
        background: rgba(167, 139, 250, 0.1);
        border: 1px solid rgba(167, 139, 250, 0.25);
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 12px;
        color: var(--accent3);
        line-height: 1.6;
      }
      .mactions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .bdone {
        flex: 1;
        padding: 13px;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 8px;
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }
      .bdone:hover {
        opacity: 0.85;
      }
      .bskip {
        padding: 13px 18px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .bskip:hover {
        border-color: var(--accent2);
        color: var(--accent2);
      }
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .empty-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      @media (max-width: 768px) {
        header {
          padding: 14px 18px;
        }
        .hero,
        .filters,
        .main {
          padding-left: 18px;
          padding-right: 18px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .search {
          margin-left: 0;
          width: 100%;
        }
        .hstats {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">JS<span>Practice</span></div>
      <div class="hstats">
        <div class="hstat">Total: <b>100</b></div>
        <div class="hstat">Done: <b id="hd">0</b></div>
        <div class="hstat">Progress: <b id="hpct">0%</b></div>
      </div>
    </header>

    <div class="hero">
      <h1>
        100 <span class="g">JavaScript</span><br />Exercises<span class="o"
          >.</span
        >
      </h1>
      <p>
        From your first console.log to async/await. Each exercise covers a key
        concept. Built for intermediate learners who want to understand deeply.
      </p>
    </div>

    <div class="prog-wrap">
      <div class="prog-inner">
        <div class="prog-top">
          <div class="prog-label">Overall Progress</div>
          <div class="prog-num"><span id="pdone">0</span> / 100 completed</div>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="pfill"></div></div>
      </div>
    </div>

    <div class="filters">
      <span class="flabel">Filter:</span>
      <button class="fbtn active" onclick="setFilter('all',this)">
        All (100)
      </button>
      <button class="fbtn" onclick="setFilter('easy',this)">Easy</button>
      <button class="fbtn" onclick="setFilter('medium',this)">Medium</button>
      <button class="fbtn" onclick="setFilter('hard',this)">Hard</button>
      <button class="fbtn" onclick="setFilter('done',this)">Done ✓</button>
      <button class="fbtn" onclick="setFilter('todo',this)">Not Done</button>
      <input
        class="search"
        placeholder="Search exercises..."
        oninput="setSearch(this.value)"
      />
    </div>

    <div class="main" id="main"></div>

    <div class="overlay" id="overlay" onclick="closeOut(event)">
      <div class="modal">
        <button class="mclose" onclick="closeModal()">✕</button>
        <div class="mnum" id="mnum"></div>
        <div class="mtitle" id="mtitle"></div>
        <div class="msub">What to do</div>
        <div class="mdesc" id="mdesc"></div>
        <div class="msub">Example</div>
        <div class="mcode" id="mcode"></div>
        <div class="msub">Hint</div>
        <div class="mhint" id="mhint"></div>
        <div class="mactions">
          <button class="bdone" id="mdone" onclick="markDone()">
            ✓ Mark as Done
          </button>
          <button class="bskip" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>

    <script>
      const CH = [
        {
          title: "Basics & console.log",
          num: "01",
          ex: [
            {
              t: "Print to Console",
              d: "Print 'Hello, World!', your name, a number, and a boolean. Practice console.log with strings, numbers, booleans, arrays, and objects.",
              e: "console.log('Hello, World!');\nconsole.log('Kaleab');\nconsole.log(42);\nconsole.log(true);\nconsole.log([1,2,3]);",
              h: "console.log() works with any data type. Strings need quotes, others don't.",
              diff: "easy",
              topic: "basics",
            },
            {
              t: "Use typeof",
              d: "Use typeof on different values: number, string, boolean, undefined, null, array, function. Notice the surprising result with null.",
              e: "console.log(typeof 42);          // 'number'\nconsole.log(typeof 'hi');        // 'string'\nconsole.log(typeof true);        // 'boolean'\nconsole.log(typeof null);        // 'object' (quirk!)\nconsole.log(typeof []);          // 'object'",
              h: "typeof null returns 'object' — famous JavaScript quirk.",
              diff: "easy",
              topic: "basics",
            },
            {
              t: "Console Methods",
              d: "Try console.warn, console.error, console.table, console.group, and console.time to measure code speed.",
              e: "console.warn('Careful!');\nconsole.error('Something broke');\nconsole.table([{a:1},{a:2}]);\nconsole.time('test');\nfor(let i=0;i<1000;i++){}\nconsole.timeEnd('test');",
              h: "Each console method has its own purpose and visual style.",
              diff: "easy",
              topic: "basics",
            },
            {
              t: "Special Characters",
              d: "Print text with escaped quotes, newline \\n, and tab \\t.",
              e: "console.log('He said \"Hello\"');\nconsole.log('Line 1\\nLine 2');\nconsole.log('Name\\tAge');",
              h: "Backslash \\ creates escape sequences inside strings.",
              diff: "easy",
              topic: "basics",
            },
          ],
        },
        {
          title: "Variables",
          num: "02",
          ex: [
            {
              t: "let vs const",
              d: "Create a let variable and reassign it. Create a const and try to reassign (read the error). Then mutate a const object's property.",
              e: "let count = 0;\ncount = 5;          // works\n\nconst PI = 3.14;\n// PI = 4;          // TypeError!\n\nconst user = {name:'K'};\nuser.name = 'Ali';   // works — only reassignment is blocked",
              h: "let allows reassignment. const blocks reassignment but not mutation.",
              diff: "easy",
              topic: "variables",
            },
            {
              t: "Variable Types",
              d: "Create variables for: string, number, boolean, null, undefined. Print all with typeof.",
              e: "let name = 'Kaleab';\nlet age = 20;\nlet active = true;\nlet empty = null;\nlet nothing;\nconsole.log(typeof name, typeof age, typeof active);",
              h: "5 primitive types: string, number, boolean, null, undefined.",
              diff: "easy",
              topic: "variables",
            },
            {
              t: "Assignment Operators",
              d: "Use ++, --, +=, *=, ??=, ||= on variables.",
              e: "let x = 5;\nx++;          // 6\nx += 10;      // 16\nx *= 2;       // 32\n\nlet val = null;\nval ??= 'default'; // 'default'",
              h: "+= and *= shortcuts modify the variable in place.",
              diff: "medium",
              topic: "variables",
            },
            {
              t: "Swap Variables",
              d: "Swap two variables WITHOUT a temporary variable using array destructuring.",
              e: "let a = 1, b = 2;\n[a, b] = [b, a];\nconsole.log(a, b); // 2 1",
              h: "Array destructuring lets you assign multiple values at once.",
              diff: "medium",
              topic: "variables",
            },
          ],
        },
        {
          title: "Strings",
          num: "03",
          ex: [
            {
              t: "String Length & Case",
              d: "Find the length of a string. Convert to uppercase and lowercase.",
              e: "let s = 'Hello World';\nconsole.log(s.length);          // 11\nconsole.log(s.toUpperCase());   // 'HELLO WORLD'\nconsole.log(s.toLowerCase());   // 'hello world'",
              h: "Use .length property and .toUpperCase()/.toLowerCase() methods.",
              diff: "easy",
              topic: "strings",
            },
            {
              t: "Template Literals",
              d: "Use backticks and ${} to embed variables in a string. Create a multiline template too.",
              e: "let name = 'Kaleab', age = 20;\nconsole.log(`My name is ${name} and I am ${age}`);\n\nlet poem = `Line 1\nLine 2\nLine 3`;",
              h: "Use backticks ` not regular quotes. ${} embeds expressions.",
              diff: "easy",
              topic: "strings",
            },
            {
              t: "Search in String",
              d: "Use .includes(), .startsWith(), .endsWith(), and .indexOf() to search inside a string.",
              e: "let s = 'JavaScript is fun';\ns.includes('Script');    // true\ns.startsWith('Java');     // true\ns.endsWith('fun');        // true\ns.indexOf('is');          // 11",
              h: "All search methods return boolean except indexOf which returns position.",
              diff: "easy",
              topic: "strings",
            },
            {
              t: "Extract Parts",
              d: "Use .slice(), .substring(), .at(), and bracket notation to access parts of a string.",
              e: "let s = 'JavaScript';\ns[0];           // 'J'\ns.at(-1);       // 't' (last char)\ns.slice(0, 4);  // 'Java'\ns.slice(-6);    // 'Script'",
              h: "Index 0 is first char. Negative numbers count from end.",
              diff: "medium",
              topic: "strings",
            },
            {
              t: "Modify Strings",
              d: "Use .replace(), .replaceAll(), .trim(), .repeat(), and .padStart().",
              e: "'hello'.replace('l', 'L');     // 'heLlo' (first only)\n'banana'.replaceAll('a', '@'); // 'b@n@n@'\n'  hi  '.trim();              // 'hi'\n'ha'.repeat(3);                // 'hahaha'\n'5'.padStart(3, '0');          // '005'",
              h: "Each method returns a new string. Strings are immutable in JavaScript.",
              diff: "medium",
              topic: "strings",
            },
            {
              t: "Split & Join",
              d: "Convert a sentence to array of words. Convert array back to string.",
              e: "let s = 'Hello World JavaScript';\nlet words = s.split(' ');     // ['Hello','World','JavaScript']\nlet back = words.join('-');   // 'Hello-World-JavaScript'",
              h: "split breaks a string into array. join combines array into string.",
              diff: "medium",
              topic: "strings",
            },
            {
              t: "Reverse a String",
              d: "Reverse 'hello' to get 'olleh'. Hint — strings don't have .reverse() but arrays do.",
              e: "let s = 'hello';\nlet rev = s.split('').reverse().join('');\nconsole.log(rev); // 'olleh'",
              h: "Split into chars, reverse the array, join back together.",
              diff: "medium",
              topic: "strings",
            },
            {
              t: "Palindrome Check",
              d: "Check if 'racecar' is a palindrome (reads same forwards and backwards).",
              e: "function isPalindrome(s){\n  return s === s.split('').reverse().join('');\n}\nconsole.log(isPalindrome('racecar')); // true",
              h: "A palindrome equals its own reverse.",
              diff: "medium",
              topic: "strings",
            },
          ],
        },
        {
          title: "Numbers & Math",
          num: "04",
          ex: [
            {
              t: "Basic Math",
              d: "Use +, -, *, /, %, and ** with numbers.",
              e: "console.log(10 + 5);   // 15\nconsole.log(10 % 3);   // 1 (remainder)\nconsole.log(2 ** 8);   // 256 (exponent)",
              h: "% gives remainder. ** is exponent (power).",
              diff: "easy",
              topic: "numbers",
            },
            {
              t: "Rounding",
              d: "Use Math.round(), Math.floor(), Math.ceil(), and .toFixed() to round numbers.",
              e: "Math.round(4.7);     // 5\nMath.floor(4.9);     // 4 (down)\nMath.ceil(4.1);      // 5 (up)\n(3.14159).toFixed(2); // '3.14'",
              h: ".toFixed() returns a string, others return numbers.",
              diff: "easy",
              topic: "numbers",
            },
            {
              t: "Min & Max",
              d: "Find the largest and smallest among 5, 12, 3, 8, 2 using Math.max and Math.min.",
              e: "Math.max(5, 12, 3, 8, 2); // 12\nMath.min(5, 12, 3, 8, 2); // 2\n\n// Spread array as arguments:\nMath.max(...[5, 12, 3]);  // 12",
              h: "Pass arguments separately or spread an array with ...",
              diff: "easy",
              topic: "numbers",
            },
            {
              t: "Random Numbers",
              d: "Generate a random number 0-1, then a random integer between 1 and 100.",
              e: "Math.random();                       // 0.0 to 1.0\n\n// Random integer 1 to 100:\nMath.floor(Math.random() * 100) + 1;",
              h: "Multiply, floor, then add minimum.",
              diff: "medium",
              topic: "numbers",
            },
            {
              t: "Convert Types",
              d: "Convert strings to numbers and vice versa.",

      let completed = JSON.parse(
        localStorage.getItem("js100-completed") || "[]",
      );
      let currentFilter = "all",
        currentSearch = "",
        currentId = null;

      function getId(ch, ex) {
        return `${ch}-${ex}`;
      }

      function updateProgress() {
        const total = CH.reduce((s, c) => s + c.ex.length, 0);
        const done = completed.length;
        const pct = Math.round((done / total) * 100);
        document.getElementById("hd").textContent = done;
        document.getElementById("hpct").textContent = pct + "%";
        document.getElementById("pdone").textContent = done;
        document.getElementById("pfill").style.width = pct + "%";
      }

      function renderAll() {
        const main = document.getElementById("main");
        main.innerHTML = "";
        let anyVisible = false;

        CH.forEach((ch, ci) => {
          let visibleCount = 0;
          const items = [];

          ch.ex.forEach((ex, ei) => {
            const id = getId(ci, ei);
            const isDone = completed.includes(id);
            const matchFilter =
              currentFilter === "all" ||
              (currentFilter === "easy" && ex.diff === "easy") ||
              (currentFilter === "medium" && ex.diff === "medium") ||
              (currentFilter === "hard" && ex.diff === "hard") ||
              (currentFilter === "done" && isDone) ||
              (currentFilter === "todo" && !isDone);
            const matchSearch =
              currentSearch === "" ||
              ex.t.toLowerCase().includes(currentSearch) ||
              ex.d.toLowerCase().includes(currentSearch) ||
              ex.topic.toLowerCase().includes(currentSearch);

            if (matchFilter && matchSearch) {
              visibleCount++;
              anyVisible = true;
              const globalNum =
                CH.slice(0, ci).reduce((s, c) => s + c.ex.length, 0) + ei + 1;
              items.push({ ex, id, isDone, globalNum, ci, ei });
            }
          });

          if (visibleCount === 0) return;

          const totalDone = ch.ex.filter((_, i) =>
            completed.includes(getId(ci, i)),
          ).length;

          const chDiv = document.createElement("div");
          chDiv.className = "chapter";
          chDiv.innerHTML = `
      <div class="ch-header">
        <div class="ch-num">CH ${ch.num}</div>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-count">${totalDone}/${ch.ex.length} done</div>
      </div>
      <div class="grid" id="grid-${ci}"></div>
    `;
          main.appendChild(chDiv);
          const grid = document.getElementById(`grid-${ci}`);

          items.forEach(({ ex, id, isDone, globalNum, ci, ei }) => {
            const card = document.createElement("div");
            card.className = `card ${isDone ? "done" : ""}`;
            card.innerHTML = `
        <div class="ctop">
          <div class="cnum">#${String(globalNum).padStart(3, "0")}</div>
          <div class="diff d${ex.diff[0]}">${ex.diff}</div>
        </div>
        <div class="ctitle">${ex.t}</div>
        <div class="cdesc">${ex.d}</div>
        <div class="cbot">
          <div class="ctopic">${ex.topic}</div>
          <div class="ccheck">${isDone ? "✓" : ""}</div>
        </div>
      `;
            card.onclick = () => openModal(ci, ei, globalNum);
            grid.appendChild(card);
          });
        });

        if (!anyVisible) {
          main.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>No exercises found</h3>
        <p>Try a different filter or search term.</p>
      </div>
    `;
        }

        updateProgress();
      }

      function openModal(ci, ei, num) {
        const ex = CH[ci].ex[ei];
        const id = getId(ci, ei);
        currentId = id;
        document.getElementById("mnum").textContent =
          `Exercise #${String(num).padStart(3, "0")} — ${CH[ci].title}`;
        document.getElementById("mtitle").textContent = ex.t;
        document.getElementById("mdesc").textContent = ex.d;
        document.getElementById("mcode").textContent = ex.e;
        document.getElementById("mhint").textContent = "💡 " + ex.h;
        const btn = document.getElementById("mdone");
        const isDone = completed.includes(id);
        btn.textContent = isDone ? "✓ Already Done!" : "✓ Mark as Done";
        btn.style.opacity = isDone ? "0.5" : "1";
        document.getElementById("overlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("overlay").classList.remove("open");
        currentId = null;
      }

      function closeOut(e) {
        if (e.target === document.getElementById("overlay")) closeModal();
      }

      function markDone() {
        if (!currentId) return;
        if (!completed.includes(currentId)) {
          completed.push(currentId);
          localStorage.setItem("js100-completed", JSON.stringify(completed));
        }
        closeModal();
        renderAll();
      }

      function setFilter(f, btn) {
        currentFilter = f;
        document
          .querySelectorAll(".fbtn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderAll();
      }

      function setSearch(v) {
        currentSearch = v.toLowerCase();
        renderAll();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      renderAll();
    </script>
